<app-navbar></app-navbar>
<br><br><br>

<div class="container-fluid mt-4">
  <img src="../assets/img/front-pages/backgrounds/hero-bg.png" alt="hero background"
    class="position-absolute top-0 start-50 translate-middle-x object-fit-cover w-100 h-100">

  <div class="row justify-content-center">
    <div class="col-xl-8 col-lg-10">
      <div class="card shadow-lg p-4">
        <h4 class="text-center text-primary mb-4">Demande d'accompagnement PFE</h4>

        <form (ngSubmit)="submitForm()" #accompagnementForm="ngForm">
          <div class="mb-3">
            <label class="form-label">Nom de l'étudiant</label>
            <input type="text" class="form-control" [(ngModel)]="accompagnement.etudiant" name="etudiant" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Sujet du PFE</label>
            <input type="text" class="form-control" [(ngModel)]="accompagnement.sujet" name="sujet" required />
          </div>

          <div class="mb-3">
            <label class="form-label">Spécialité</label>
            <select class="form-control" [(ngModel)]="accompagnement.specialite" name="specialite" required>
              <option value="informatique">Informatique</option>
              <option value="telecom">Télécom</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Compétences (séparées par des virgules)</label>
            <input type="text" class="form-control" [(ngModel)]="accompagnement.competences" name="competences" />
          </div>

          <div class="mb-3">
            <label class="form-label">Niveau</label>
            <select class="form-control" [(ngModel)]="accompagnement.niveau" name="niveau" required>
              <option value="L3">L3</option>
              <option value="M1">M1</option>
              <option value="M2">M2</option>
            </select>
          </div>

          <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary px-4">Soumettre</button>
          </div>
        </form>

       
<!-- MODAL Bootstrap -->
<div class="modal fade" id="responseModal" tabindex="-1" aria-labelledby="responseModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content shadow">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title" id="responseModalLabel">Résultat de la demande</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Fermer"></button>
        </div>
        <div class="modal-body">
          <p>{{ responseMessage }}</p>
          <p *ngIf="assignedEncadrant">Encadrant assigné : <strong>{{ assignedEncadrant }}</strong></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Fermer</button>
        </div>
      </div>
    </div>
  </div>
