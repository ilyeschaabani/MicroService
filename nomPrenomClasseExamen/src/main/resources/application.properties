spring.application.name=MICROEVENTTOPIC

server.port=8088


# Eureka configuration
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
eureka.client.register-with-eureka=true
spring.cloud.config.enabled=false

### DATABASE ###
spring.datasource.url=jdbc:mysql://mysql:3306/eventtopiccccc?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root



logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=update

# Logging levels
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG
logging.level.com.netflix.discovery=DEBUG

# Ajoutez dans votre application.properties
spring.cloud.loadbalancer.health-check.interval=2s
spring.cloud.loadbalancer.cache.enabled=false
eureka.client.registry-fetch-interval-seconds=5
logging.level.org.springframework.data=DEBUG

