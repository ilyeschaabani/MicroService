spring.application.name=PROJETMICROSERVICE

# Configuration for MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/PiDevMSS?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC


server.port=9092
spring.cloud.config.import-check.enabled=false
spring.datasource.username=root
spring.datasource.password=
### JPA / HIBERNATE ###
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Activer les WebSockets
spring.websocket.enabled=true


cors.allowed-origins=http://localhost:4200
cors.allowed-methods=GET,POST,PUT,DELETE
cors.allowed-headers=*

# Activer les logs dťtaillťs
logging.level.tn.esprit=DEBUG
logging.level.org.springframework.web=DEBUG


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.instance.hostname=localhost

eureka.client.register-with-eureka=true