spring.application.name=MICROSERVICEEVALUATION

# Eureka configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
spring.cloud.config.enabled=false

### DATABASE ###
spring.datasource.url=jdbc:mysql://localhost:3306/micro?createDatabaseIfNotExist=true&useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

### JPA / HIBERNATE ###
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.jpa.hibernate.ddl-auto=update

# Logging levels
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=DEBUG

# Server port
server.port=8095
