# DÈsactivation du client Spring Cloud Config (si non utilisÈ)
spring.cloud.config.enabled=false

### Application Basics ###
spring.application.name=RessourceMicroService
server.port=8082
# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/ressource_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
### JPA/Hibernate Settings ###
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

### Eureka Client Configuration ###
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

### Disable MongoDB Auto-Configuration ###
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration
