version: '3'
services:
  auth-service:
    container_name: auth-service
    build:
      context: ./Authentification-MicroService
      dockerfile: Dockerfile
    ports:
      - "9006:9006"
    networks:
      - pi-network
    depends_on:
      - eureka-server
      - gateway

  ressource-service:
    container_name: resource-service
    build:
      context: ./RessourceMicroService
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - pi-network
    depends_on:
      - eureka-server
      - gateway
      - mysql

  mysql:
      container_name: mysql
      image: mysql:8.0
      volumes:
        - mysql_data:/var/lib/mysql
        - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      environment:
        MYSQL_ROOT_PASSWORD: root
        MYSQL_DATABASE: codingFactory
      networks:
        - pi-network
      ports:
        - "3306:3306"


  eureka-server:
    container_name: eureka-server
    build:
      context: ./EurekaServer
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    networks:
      - pi-network

  gateway:
    container_name: gateway
    build:
      context: ./Gateway
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    networks:
      - pi-network
    depends_on:
      - eureka-server

networks:
  pi-network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
