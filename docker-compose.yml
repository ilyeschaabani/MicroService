version: '3.8'

services:
  # Eureka Server
  eureka-server:
    image: openjdk:17-jdk-slim
    container_name: eureka-server
    build: 
      context: ./eureka-server
      dockerfile: Dockerfile
    ports:
      - "8761:8761"
    environment:
      - SPRING_APPLICATION_NAME=EurekaServer
      - SERVER_PORT=8761
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false
    networks:
      - microservice-network

  # API Gateway
  api-gateway:
    image: openjdk:17-jdk-slim
    container_name: api-gateway
    build: 
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8089:8089"
    environment:
      - SPRING_APPLICATION_NAME=Gateway
      - SERVER_PORT=8089
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
      - EUREKA_CLIENT_FETCH_REGISTRY=true
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_ENABLED=true
      - SPRING_CLOUD_GATEWAY_DISCOVERY_LOCATOR_LOWER_CASE_SERVICE_ID=true
      - SPRING_CLOUD_LOADBALANCER_CONFIGURATIONS=random
    depends_on:
      - eureka-server
    networks:
      - microservice-network

  # AccompagnementPFE Microservice
  accompagnement-pfe-microservice:
    image: openjdk:17-jdk-slim
    container_name: accompagnement-pfe-microservice
    build: 
      context: ./accompagnement-pfe
      dockerfile: Dockerfile
    ports:
      - "8061:8061"
    environment:
      - SPRING_APPLICATION_NAME=AccompagnementPFEMicroService
      - SERVER_PORT=8061
      - SPRING_DATASOURCE_URL=jdbc:h2:mem:AccompagnementPFE
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.h2.Driver
      - SPRING_DATASOURCE_USERNAME=rawen
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.H2Dialect
      - SPRING_H2_CONSOLE_ENABLED=true
      - SPRING_H2_CONSOLE_PATH=/h2-console
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_CLOUD_CONFIG_ENABLED=false
      - SPRING_CLOUD_CONFIG_FAIL_FAST=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-server:8761/eureka
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=true
    depends_on:
      - eureka-server
    networks:
      - microservice-network

networks:
  microservice-network:
    driver: bridge
